name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if release already exists
        id: release-exists
        uses: insightsengineering/release-existence-action@v1.0.0
        with:
          release-tag: v${{ steps.version.outputs.VERSION }}

      - name: Cancel this workflow run
        if: steps.release-exists.outputs.release-exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Release v${{ steps.version.outputs.VERSION }} already exists. Cancelling...')
            await github.rest.actions.cancelWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            })

      - name: Wait for cancellation
        if: steps.release-exists.outputs.release-exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const delay = ms => new Promise(res => setTimeout(res, ms));
            while (true) {
              core.info('Waiting for workflow to cancel...');
              await delay(5000);
            }

      - name: Create and push tag (replace if exists on wrong commit)
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          COMMIT=$(git rev-parse HEAD)

          EXISTING=$(git ls-remote --tags origin "$TAG" | awk '{print $1}')
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "$COMMIT" ]; then
            echo "Tag $TAG exists on $EXISTING, replacing on $COMMIT"
            git push origin ":refs/tags/$TAG"
            git tag -d "$TAG" 2>/dev/null || true
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Generate release notes (latest only)
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG-latest.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG-latest.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create backmerge PR and enable auto-merge
        run: |
          gh pr create \
            --base develop \
            --head master \
            --title "chore: merge release v${{ steps.version.outputs.VERSION }} back to develop" \
            --body "Backmerge after v${{ steps.version.outputs.VERSION }} release. Contains CHANGELOG.md and version bump." \
            --label "automated,backmerge" \
            || true

          gh pr merge --auto --merge || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
