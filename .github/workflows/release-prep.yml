name: Release Prep

on:
  push:
    branches: [release]

# Don't forget also permissions on repository level:
# - Go to https://github.com/YOUR_ORG/YOUR_REPO/settings/actions
# - Check "Allow GitHub Actions to create and approve pull requests" (will be grayed out until org-level is enabled)
permissions:
  contents: write
  pull-requests: write
  actions: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: extension
        run: npm install
      - name: Run tests
        working-directory: extension
        run: node --import tsx --test ../tests/*.test.ts

  changelog:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: Get version from git-cliff
        id: version
        run: |
          VERSION=$(git-cliff --bumped-version | sed -E 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Version tag: $VERSION_TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Write version to package.json
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ steps.version.outputs.VERSION }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog header
        uses: orhun/git-cliff-action@v4
        with:
          args: --body "" --strip footer --offline
        env:
          OUTPUT: CHANGELOG-header.md

      - name: Generate changes for current release
        uses: orhun/git-cliff-action@v4
        with:
          args: --bump --unreleased --strip all
        env:
          OUTPUT: CHANGELOG-bump.md

      - name: Fetch prior changelog from master
        run: |
          git checkout origin/master -- CHANGELOG.md 2>/dev/null || true
          if [ -f CHANGELOG.md ]; then
            sed -n '/^## \[/,$p' CHANGELOG.md > CHANGELOG-prior.md
          else
            touch CHANGELOG-prior.md
          fi

      - name: Assemble full CHANGELOG.md
        run: |
          cat CHANGELOG-header.md > CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG-bump.md >> CHANGELOG.md
          if [ -s CHANGELOG-prior.md ]; then
            echo "" >> CHANGELOG.md
            cat CHANGELOG-prior.md >> CHANGELOG.md
          fi
          git-cliff --body="" --strip header --offline >> CHANGELOG.md
          rm -f CHANGELOG-header.md CHANGELOG-bump.md CHANGELOG-prior.md

      - name: Commit changelog and version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md package.json
          git commit -m "chore(release): prepare release, bump to ${{ steps.version.outputs.VERSION }} [skip ci]" || true
          git push origin release

      - name: Create or update PR release → master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: Release ${{ steps.version.outputs.VERSION_TAG }} release → master
          PR_BODY: |
            ## Merge release branch into master

            This PR merges the `release` branch into `master` for production deployment.

            - Version: `${{ steps.version.outputs.VERSION }}`
            - CHANGELOG.md regenerated
            - `version` in package.json updated

            ### Review checklist:
            - [ ] All tests pass
            - [ ] Changelog updated
            - [ ] Version bumped

            ---
            Automated changes by GitHub Actions (with `gh pr create ...`)
        run: |
          EXISTING=$(gh pr list --head release --base master --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, updating title + body..."
            gh pr edit "$EXISTING" --title "$PR_TITLE" --body "$PR_BODY"
          else
            gh pr create \
              --base master \
              --head release \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --label "release,automated"
          fi
