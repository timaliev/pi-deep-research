name: Changelog

on:
  pull_request:
    branches: [master]

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Get version from package.json
        id: version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Generate changelog header (empty template)
        uses: orhun/git-cliff-action@v4
        with:
          args: --bump --unreleased --strip all
        env:
          OUTPUT: CHANGELOG-header.md

      - name: Generate changes for current release (--bump, no header)
        uses: orhun/git-cliff-action@v4
        with:
          args: --bump --strip header
        env:
          OUTPUT: CHANGELOG-bump.md

      - name: Fetch master for prior changelog
        run: |
          git fetch origin master
          git checkout origin/master -- CHANGELOG.md 2>/dev/null || touch CHANGELOG-prior.md
          # Extract all prior release entries (everything after the header)
          if [ -f CHANGELOG.md ]; then
            sed -n '/^## \[/,$p' CHANGELOG.md > CHANGELOG-prior.md
          else
            touch CHANGELOG-prior.md
          fi

      - name: Assemble full CHANGELOG.md
        run: |
          cat CHANGELOG-header.md > CHANGELOG.md
          echo "" >> CHANGELOG.md
          cat CHANGELOG-bump.md >> CHANGELOG.md
          if [ -s CHANGELOG-prior.md ]; then
            echo "" >> CHANGELOG.md
            cat CHANGELOG-prior.md >> CHANGELOG.md
          fi

      - name: Commit and push CHANGELOG.md
        run: |
          git checkout ${{ github.head_ref }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit."
          else
            git commit -m "chore(release): regenerate CHANGELOG.md for v${{ steps.version.outputs.VERSION }} [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
