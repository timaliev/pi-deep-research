name: Test & Lint

on:
  push:
    branches-ignore: [master, release]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome lint extension/ tests/ --max-diagnostics=50

      - name: Format check
        run: npx biome format extension/ tests/

      - name: Install extension dependencies
        working-directory: extension
        run: npm install

      - name: Run tests
        working-directory: extension
        run: node --import tsx --test ../tests/*.test.ts
