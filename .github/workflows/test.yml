name: Test

on:
  push:
    branches-ignore: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: extension
        run: npm install

      - name: Run tests
        working-directory: extension
        run: node --import tsx --test ../tests/*.test.ts
