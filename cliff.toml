# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration
# (c) 2026 Tim Aliev (https://github.com/timaliev)
# Custom git-cliff configuration for my projects
# DO NOT FORGET TO PUT YOUR REPOSITORY URL/NAME IN changelog.postprocessors AND git.link_parsers
# If working on GitHub repository uncomment `remote.github` section at the end
# of this configuration file.
# Put this file as `cliff.toml` in your git repository root and run `git-cliff`.

[changelog]
# A Tera template to be rendered as the changelog's footer.
# See https://keats.github.io/tera/docs/#introduction
header = """
# CHANGELOG\n
All notable changes to this project will be documented in this file. See [conventional commits](https://www.conventionalcommits.org/) for commit guidelines.\n
The format is close to [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n
---
###### Auto-generated by [Git-cliff](https://git-cliff.org). Custom `git-cliff` configuration is available [here](https://gist.github.com/timaliev/406970c576e5553b3e98216ff95ebb67).\n
"""
# A Tera template to be rendered for each release in the changelog.
# See https://keats.github.io/tera/docs/#introduction
# Filter merge commits: https://git-cliff.org/docs/tips-and-tricks#filter-merge-commits
# {% if github -%}
# {%- set current_repository = self::gh_remote_url() -%}
# {%- else -%}
# {%- set current_repository = "$REPO" -%}
# {%- endif -%}

body = """
---\n

{% if github -%}
  {%- set current_repository = self::gh_remote_url() -%}
{%- else -%}
  {%- set current_repository = "$REPO" -%}
{%- endif -%}

{% if version %}\
    {% if previous.version %}\
        ## [{{ version | trim_start_matches(pat="v") }}]({{ current_repository }}/compare/{{ previous.version }}..{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}\
        ## [{{ version | trim_start_matches(pat="v") }}]({{ current_repository }}/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}\
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits
      | filter(attribute="scope")
      | sort(attribute="scope")
    %}
        - **({{commit.scope}})**{% if commit.breaking %} [**breaking**]{% endif %} \
            {{ commit.message }} - ([{{ commit.id | truncate(length=7, end="") }}]({{ current_repository }}/commit/{{ commit.id }})) - {{ commit.author.name }}
    {%- endfor -%}
    {% raw %}\n{% endraw %}\
    {%- for commit in commits %}
        {%- if commit.scope -%}
        {% else -%}
            - {% if commit.breaking %} [**breaking**]{% endif %}\
                {{ commit.message }} - ([{{ commit.id | truncate(length=7, end="") }}]({{ current_repository }}/commit/{{ commit.id }})) - {{ commit.author.name }}
        {% endif -%}
    {% endfor -%}
{% endfor %}\n

{%- macro gh_remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}
"""
# A Tera template to be rendered as the changelog's footer.
# See https://keats.github.io/tera/docs/#introduction
footer = """
<!-- generated by git-cliff -->
"""
# Remove leading and trailing whitespaces from the changelog's body.
trim = true
# Render body even when there are no releases to process.
render_always = true
# postprocessors
postprocessors = [
    # Replace the placeholder `<REPO>` with a URL.
    { pattern = '\$REPO', replace = "https://github.com/timaliev/pi-deep-research" }, # replace repository URL
]

[git]
# Parse commits according to the conventional commits specification.
# See https://www.conventionalcommits.org
conventional_commits = true
# Exclude commits that do not match the conventional commits specification.
filter_unconventional = false
# Split commits on newlines, treating each line as an individual commit.
split_commits = false
# An array of regex based parsers to modify commit messages prior to further processing.
commit_preprocessors = [
    # Replace issue numbers with link templates to be updated in `changelog.postprocessors`.
    #{ pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/orhun/git-cliff/issues/${2}))"},
]
# An array of regex based parsers for extracting data from the commit message.
# Assigns commits to groups.
# Optionally sets the commit's scope and can decide to exclude commits from further processing.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 --> Features" },
    { message = "^fix", group = "<!-- 1 --> Bug Fixes" },
    { message = "^doc", group = "<!-- 3 --> Documentation" },
    { message = "^docs", group = "<!-- 3 --> Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "<!-- 2 --> Refactoring" },
    { message = "^style", group = "Style" },
    { message = "^revert", group = "Revert" },
    { message = "^test", group = "<!-- 4 --> Tests" },
    { message = "^tests", group = "<!-- 4 --> Tests" },
    { body = ".*security", group = "Security" },
    { message = "^chore\\(version\\):", skip = true },
    { message = "^chore\\(wip\\):", skip = true },
    { message = "^chore", group = "<!-- 8 --> Miscellaneous Chores" },
    { message = "^Merge pull request", skip = true },
    { message = "(^Update |^Create ).*\\.(yaml|yml)$", skip = true },
    { message = ".*", group = "<!-- 9 --> Other" },
]
# Exclude commits that are not matched by any commit parser.
filter_commits = false
# Fail on a commit that is not matched by any commit parser.
fail_on_unmatched_commit = false
# An array of link parsers for extracting external references, and turning them into URLs, using regex.
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/timaliev/pi-deep-research/issues/$1"},
    { pattern = "RFC(\\d+)", text = "ietf-rfc$1", href = "https://datatracker.ietf.org/doc/html/rfc$1"},
]
# Include only the tags that belong to the current branch.
use_branch_tags = false
# Order releases topologically instead of chronologically.
topo_order = false
# Order commits topologically instead of chronologically.
topo_order_commits = true
# Order of commits in each group/release within the changelog.
# Allowed values: newest, oldest
sort_commits = "oldest"
# Process submodules commits
recurse_submodules = false
tag_pattern = "^v\\d+\\.\\d+\\.\\d+$"
skip_tags = ""
ignore_tags = ""

[bump]
features_always_bump_minor = true
breaking_always_bump_major = false
custom_major_increment_regex = "major"
custom_minor_increment_regex = "minor|more"
initial_tag = "0.1.0"

[remote.github]
owner = "timaliev"
repo = "pi-deep-research"
